<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Pomodoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img id="bg-image" src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=2000" alt="background">

    <div class="glass-card">
        <div id="status-label">Work Mode</div>
        <h1 id="timer-display">25:00</h1>
        
        <div class="button-group">
            <button id="start-btn" onclick="startTimer()">Start</button>
            <button id="pause-btn" onclick="pauseTimer()">Pause</button>
            <button id="reset-btn" onclick="resetTimer()">Reset</button>
        </div>

        <div class="stats">
            Completed: <span id="session-count">0</span>
        </div>
    </div>

    <audio id="alarm-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
